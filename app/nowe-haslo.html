<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Ustaw nowe hasło</title>
<link rel="stylesheet" href="assets/css/login.css">
  <link rel="stylesheet" href="/assets/css/app-footer.css">
</head>

<body>

<div class="login-page">

  <div class="login-header">
    <h2>AI-IQ Kalendarz Rezerwacji</h2>
    <p>Ustaw nowe hasło do panelu administratora</p>
  </div>

  <div class="box login-box">
    <h2>Nowe hasło</h2>

    <form id="newPasswordForm">
      <div class="login-password-field">
        <input
          type="password"
          id="password"
          placeholder="Nowe hasło"
          autocomplete="new-password"
        >

        <button
          type="button"
          class="login-toggle-password"
          onclick="togglePassword()"
          aria-label="Pokaż lub ukryj hasło"
        >
          <span class="password-eye password-eye-open">👁️</span>
          <span class="password-eye password-eye-closed">🙈</span>
        </button>
      </div>

      <div id="password-strength" class="login-password-strength">
        <div class="login-strength-track">
          <div id="strength-bar" class="login-strength-bar"></div>
        </div>
        <p id="strength-text">Siła hasła</p>
      </div>

      <div class="login-password-field">
        <input
          type="password"
          id="password2"
          placeholder="Powtórz hasło"
          autocomplete="new-password"
        >
      </div>

      <button type="submit" class="login-submit-btn">
        Zapisz nowe hasło
      </button>
    </form>

    <p class="login-reset-link">
      <a href="logowanie.html">Powrót do logowania</a>
    </p>

    <p class="error" id="msg" aria-live="polite"></p>
  </div>

  <div class="login-footer app-footer" data-app-footer></div>

</div>

<script src="assets/js/nowe-haslo.js?v=2"></script>

  <script src="/assets/js/app-footer.js" defer></script>
</body>
</html>
