<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adres niezarejestrowany</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #102033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid #dbe5f3;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ten adres nie jest zarejestrowany w AI-IQ Rezerwacja Pro.</h1>
  </main>
</body>
</html>
