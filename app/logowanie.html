<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Logowanie</title>
<link rel="stylesheet" href="assets/css/login.css">
  <link rel="stylesheet" href="/assets/css/app-footer.css">
</head>

<body>

<div class="login-page">

  <div class="login-header">
    <h2>AI-IQ Kalendarz Rezerwacji</h2>
    <p>Panel logowania administratora</p>
  </div>

  <div class="box login-box">
    <h2>Logowanie</h2>

    <form>
      <input type="email" id="email" placeholder="Email" autocomplete="email">

      <div class="login-password-field">
        <input type="password" id="password" placeholder="Hasło" autocomplete="current-password">

        <button
          type="button"
          class="login-toggle-password"
          aria-label="Pokaż lub ukryj hasło"
        >
          <span class="password-eye password-eye-open">👁️</span>
          <span class="password-eye password-eye-closed">🙈</span>
        </button>
      </div>

      <button type="submit" class="login-submit-btn">Zaloguj</button>
    </form>

    <p class="login-reset-link">
      <a href="reset-hasla.html">Zapomniałeś hasła?</a>
    </p>

    <p class="login-reset-link" id="activationReissueWrap" hidden>
      <button type="button" class="login-submit-btn" id="activationReissueBtn">
        Wyślij ponownie link aktywacyjny
      </button>
    </p>

    <p class="error" id="err" aria-live="polite"></p>
  </div>

  <div class="login-footer app-footer" data-app-footer></div>
</div>

<script src="assets/js/login.js?v=7"></script>

  <script src="/assets/js/app-footer.js" defer></script>
</body>
</html>
