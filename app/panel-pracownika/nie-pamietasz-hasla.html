<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Reset hasła personelu</title>
  <link rel="stylesheet" href="/panel-pracownika/assets/css/auth-pracownika.css?v=3">
  <link rel="stylesheet" href="/panel-pracownika/assets/css/logowanie-pracownika.css?v=3">
  <link rel="stylesheet" href="/assets/css/app-footer.css">
</head>
<body>
  <main class="employee-auth-page">
    <section class="employee-auth-header" aria-labelledby="employee-forgot-page-title">
      <h1 id="employee-forgot-page-title">Panel personelu</h1>
      <p>Podaj e-mail, aby otrzymać link do ustawienia nowego hasła.</p>
    </section>

    <section class="employee-auth-card" aria-labelledby="employee-forgot-title">
      <h2 id="employee-forgot-title" class="employee-auth-title">Nie pamiętasz hasła?</h2>
      <p class="employee-auth-description">
        Jeśli konto personelu istnieje, wyślemy wiadomość z instrukcją resetu hasła.
      </p>

      <form class="employee-auth-form" id="employeeForgotPasswordForm" novalidate>
        <label class="employee-auth-field" for="employeeForgotEmail">
          <span>E-mail</span>
          <input
            type="email"
            id="employeeForgotEmail"
            name="email"
            autocomplete="username"
            required
          >
        </label>

        <button type="submit" class="employee-auth-submit" id="employeeForgotSubmit">
          Wyślij link resetujący
        </button>
      </form>

      <p class="employee-auth-message" id="employeeForgotMessage" aria-live="polite"></p>

      <p class="employee-auth-link">
        <a href="/panel-personelu/logowanie.html">Wróć do logowania personelu</a>
      </p>
    </section>

    <footer class="employee-auth-footer app-footer" data-app-footer></footer>
  </main>

  <script src="/panel-pracownika/assets/js/nie-pamietasz-hasla.js?v=1"></script>
  <script src="/assets/js/app-footer.js" defer></script>
</body>
</html>
