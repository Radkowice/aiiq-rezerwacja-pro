limit_req_zone $binary_remote_addr zone=book_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm index.php;
    server_tokens off;
    # Ukrywa nagłówek PHP-FPM: X-Powered-By: PHP/x.y.z
    fastcgi_hide_header X-Powered-By;
    client_max_body_size 3m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://app-api.fioncore.cloud; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self' https://ai-iq.pl https://www.ai-iq.pl;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=(), magnetometer=()" always;

    location = /_subdomain_guard {
        internal;
        include fastcgi_params;
        fastcgi_pass aiiq-rezerwacja-pro-php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/api/system/subdomain-guard.php;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
    }

    location = /niezarejestrowany-adres.php {
        root /usr/share/nginx/html;
        include fastcgi_params;
        fastcgi_pass aiiq-rezerwacja-pro-php:9000;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/niezarejestrowany-adres.php;
        access_log off;
    }

    location ^~ /assets/css/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ^~ /assets/js/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location = /rezerwacja.html {
        auth_request /_subdomain_guard;
        error_page 403 = /niezarejestrowany-adres.php;
        return 301 /;
    }

    location = /favicon.png {
        root /usr/share/nginx/html;
        try_files /favicon.png =404;
        access_log off;
        expires 7d;
    }

    location ^~ /data/ {
        deny all;
        return 403;
    }


    # Blokada bezpośredniego dostępu do katalogów runtime/logów/cache/kolejek.
    # API i assety mają być obsługiwane przez kontrolowane endpointy PHP, nie przez bezpośredni odczyt plików.
    location ^~ /api/data/ {
        access_log off;
        return 403;
    }

    location ^~ /api/logs/ {
        access_log off;
        return 403;
    }

    location ^~ /api/cache/ {
        access_log off;
        return 403;
    }

    location ^~ /api/queue/ {
        access_log off;
        return 403;
    }

    location ^~ /api/runtime/ {
        access_log off;
        return 403;
    }

    location ^~ /api/tmp/ {
        access_log off;
        return 403;
    }

    location ^~ /api/temp/ {
        access_log off;
        return 403;
    }

    location ^~ /logs/ {
        access_log off;
        return 403;
    }

    location ^~ /cache/ {
        access_log off;
        return 403;
    }

    location ^~ /queue/ {
        access_log off;
        return 403;
    }

    location ^~ /runtime/ {
        access_log off;
        return 403;
    }

    location ^~ /tmp/ {
        access_log off;
        return 403;
    }

    location ^~ /temp/ {
        access_log off;
        return 403;
    }

    # Blokada plików konfiguracyjnych, kopii i artefaktów technicznych, gdyby trafiły do webroot.
    location ~* (^|/)\.(?!well-known/) {
        access_log off;
        return 404;
    }

    location ~* \.(?:log|bak|old|orig|save|sql|sqlite|db|env|ini|conf|yml|yaml|lock|composer|md|txt)$ {
        access_log off;
        return 403;
    }

    location ~ ^/api/(.*\.php)$ {
        include fastcgi_params;
        fastcgi_pass aiiq-rezerwacja-pro-php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/api/$1;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    location ^~ /dokumenty/ {
        auth_request /_subdomain_guard;
        error_page 403 = /niezarejestrowany-adres.php;
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
    }

    location ^~ /panel-pracownika/ {
        auth_request /_subdomain_guard;
        error_page 403 = /niezarejestrowany-adres.php;
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
    }

    location ~ ^/panel-personelu/(.*)$ {
        auth_request /_subdomain_guard;
        error_page 403 = /niezarejestrowany-adres.php;
        root /usr/share/nginx/html;
        try_files /panel-pracownika/$1 =404;
        access_log off;
    }

    location = /konto-aktywne.html {
        root /usr/share/nginx/html;
        try_files /konto-aktywne.html =404;
        access_log off;
        expires 5m;
    }

    location = /aktywacja-link.html {
        root /usr/share/nginx/html;
        try_files /aktywacja-link.html =404;
        access_log off;
        expires 5m;
    }

    location / {
        auth_request /_subdomain_guard;
        error_page 403 = /niezarejestrowany-adres.php;
        try_files $uri $uri/ /rezerwacja.html;
    }

    location ~ \.php$ {
        auth_request /_subdomain_guard;
        error_page 403 = /niezarejestrowany-adres.php;
        root /usr/share/nginx/html;
        include fastcgi_params;
        fastcgi_pass aiiq-rezerwacja-pro-php:9000;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }
}
