limit_req_zone $binary_remote_addr zone=book_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm index.php;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://app-api.fioncore.cloud; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self' https://ai-iq.pl https://www.ai-iq.pl;" always;

    location = /rezerwacja.html {
        return 301 /;
    }

    location ^~ /data/logo/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ^~ /data/favicon/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ^~ /data/ {
        deny all;
        return 403;
    }

    location ~ ^/api/(.*\.php)$ {
        include fastcgi_params;
        fastcgi_pass aiiq-rezerwacja-pro-php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/api/$1;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    location ^~ /dokumenty/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
    }

    location ^~ /panel-pracownika/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
    }

    location ~ ^/panel-personelu/(.*)$ {
        root /usr/share/nginx/html;
        try_files /panel-pracownika/$1 =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /rezerwacja.html;
    }

    location ~ \.php$ {
        root /usr/share/nginx/html;
        include fastcgi_params;
        fastcgi_pass aiiq-rezerwacja-pro-php:9000;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }
}